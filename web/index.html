<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PostGen Cloud MVP</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="container">
    <h1>PostGen Cloud MVP</h1>
    <p class="subtitle">Generate affiliate posts from URLs and account templates in your browser.</p>

    <section class="grid">
      <div class="panel">
        <label for="urls">Product URLs (one per line)</label>
        <textarea id="urls" placeholder="https://amazon.in/...&#10;https://amazon.in/..."></textarea>
      </div>

      <div class="panel">
        <label>Accounts</label>
        <div id="accounts" class="accounts"></div>
        <div class="btn-row">
          <button id="generate" class="primary" type="button">Generate</button>
          <button id="selectAll" class="secondary" type="button">Select All</button>
          <button id="clear" class="secondary" type="button">Clear</button>
        </div>
        <div id="status" class="status"></div>
      </div>
    </section>

    <section id="results" class="results"></section>

    <section class="panel templates-panel">
      <div class="templates-head">
        <h2>Template Manager</h2>
        <div class="templates-controls">
          <select id="templateSelect"></select>
          <button id="reloadTemplates" class="secondary" type="button">Reload</button>
          <button id="saveTemplate" class="primary" type="button">Save Template</button>
        </div>
      </div>
      <textarea id="templateEditor" class="template-editor" placeholder="Select a template to edit..."></textarea>
      <div id="templateStatus" class="status"></div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
